version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pgagi_postgres
    environment:
      POSTGRES_USER: pgagi_user
      POSTGRES_PASSWORD: pgagi_password
      POSTGRES_DB: candidate_screening
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgagi_user -d candidate_screening"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pgagi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgagi_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pgagi_user:pgagi_password@postgres:5432/candidate_screening
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
      DEBUG: "True"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgagi_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
